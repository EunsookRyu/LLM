# docker-compose.yml
# 가이드 참조: chapter11_embedding_server.md L587–L713
# Ch11 시점: 5-서비스 (frontend + backend + qdrant + ollama + embedding-server)
services:

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chatbot-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-documents}
      - EMBEDDING_VECTOR_SIZE=${EMBEDDING_VECTOR_SIZE:-1024}
      # HyperCLOVA X API (2단계)
      - CLOVA_API_KEY=${CLOVA_API_KEY:-}
      - CLOVA_API_GATEWAY_KEY=${CLOVA_API_GATEWAY_KEY:-}
      # LLM 서버 설정 (3단계)
      - LLM_PROVIDER=${LLM_PROVIDER:-clova}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-}
      # 임베딩 서버 설정 (3단계)
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-clova}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chatbot-network

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: chatbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - chatbot-network

  ollama:
    image: ollama/ollama:latest
    container_name: chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - chatbot-network

  embedding-server:
    build:
      context: ./embedding-server
      dockerfile: Dockerfile
    container_name: chatbot-embedding
    ports:
      - "8001:8001"
    volumes:
      - ${BGE_M3_PATH:-/tmp}:/models/bge-m3:ro
    environment:
      - MODEL_PATH=/models/bge-m3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
