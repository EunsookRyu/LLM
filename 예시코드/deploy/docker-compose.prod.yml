# docker-compose.prod.yml

services:

  backend:
    # 포트를 외부에 노출하지 않는다.
    # 프론트엔드가 내부 네트워크로 접근하므로 포트 포워딩이 불필요하다.
    ports: !reset []

  frontend:
    # Streamlit 프론트엔드만 외부에 노출한다.
    ports:
      - "8501:8501"

  qdrant:
    # Qdrant는 외부에 노출하지 않는다.
    ports: !reset []

  ollama:
    # Ollama는 외부에 노출하지 않는다.
    ports: !reset []

  embedding-server:
    # 임베딩 서버는 외부에 노출하지 않는다.
    ports: !reset []
