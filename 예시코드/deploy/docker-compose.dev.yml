# docker-compose.dev.yml
services:
  backend:
    build:
      context: ../backend
    volumes:
      - ../backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ../frontend
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.runOnSave=true"]
    volumes:
      - ../frontend:/app
